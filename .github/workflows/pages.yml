name: Build and publish Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "47 */8 * * *"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out analytics repo
        uses: actions/checkout@v6
        with:
          path: my-spotify-analytics
      - name: Check out canonical data
        uses: actions/checkout@v6
        with:
          repository: chekos/my-spotify-data
          path: my-spotify-data
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: my-spotify-analytics/pyproject.toml
      - name: Install package
        working-directory: my-spotify-analytics
        run: python -m pip install -e .
      - name: Test
        working-directory: my-spotify-analytics
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Build site
        working-directory: my-spotify-analytics
        run: python scripts/build_site.py --data-dir ../my-spotify-data/data
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: my-spotify-analytics/site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
